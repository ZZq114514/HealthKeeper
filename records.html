<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>记录管理</title>
    <!-- 公共样式 -->
    <link rel="stylesheet" href="css/main.css">
    <script src="js/initdatabase.js"></script>
    <script src="js/main.js"></script>
    <style>
        /* ===== 记录页特有样式 ===== */
        html body {
            padding: 0 !important;
        }
        html body .container {
            padding: 12px 0 0 !important;
            height: 100%;
            max-width: 100% !important;
            margin: 0 !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        html body .nav-bar {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 6px 12px !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        html body .nav-bar .title {
            flex: 1 !important;
            text-align: center !important;
            font-size: 18px;
            font-weight: 600;
        }
        html body .nav-bar .back-btn {
            padding: 12px 16px !important;   /* 增大点击区域 */
            font-size: 32px !important;      /* 符号更大 */
            min-width: 44px !important;
            min-height: 44px !important;
            background: none !important;
            border: none !important;
            color: #1c1c1e !important;
            cursor: pointer !important;
        }
        html body .nav-bar .add-btn {
            padding: 8px 16px !important;
            font-size: 16px !important;
            background: #1c1c1e !important;
            border: none !important;
            color: #fff !important;
            border-radius: 20px !important;
            cursor: pointer !important;
            flex-shrink: 0 !important;
        }
        html body .record-list {
            padding: 10px 12px !important;
        }
        .record-wrapper {
            overflow: hidden;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            position: relative;
            flex-shrink: 0;
            touch-action: pan-y;
        }
        .record-slide {
            display: flex;
            align-items: stretch;
            transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
            transform: translateX(0);
        }
        .record-content {
            flex: 1;
            padding: 16px;
            background: rgba(255, 255, 255, 0.92);
            min-width: 0;
            cursor: default;
        }
        .record-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .record-date {
            font-size: 17px;
            font-weight: 600;
        }
        .record-date .weekday {
            font-weight: 400;
            color: #8e8e93;
            font-size: 14px;
            margin-left: 8px;
        }
        .record-details {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 12px;
            font-size: 15px;
            color: #3a3a3c;
            margin-top: 2px;
        }
        .record-details .detail-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .record-details .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            background: #f0eeec;
            color: #6e6e73;
        }
        .record-details .tag.active-tool {
            background: #e0f0ff;
            color: #007aff;
        }
        .record-details .tag.active-partner {
            background: #ffebf0;
            color: #d6336c;
        }
        .record-details .tag.active-material {
            background: #e6f7e6;
            color: #2d8a4e;
        }
        .record-method {
            font-size: 14px;
            color: #6e6e73;
            margin-top: 2px;
            font-style: italic;
        }

        .record-delete {
            width: 80px;
            background: #ff3b30;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }
        .record-delete:active {
            background: #cc2d24;
        }

        .empty-tip {
            text-align: center;
            color: #8e8e93;
            font-size: 15px;
            padding: 40px 0;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            padding: 24px 20px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-box h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal-field {
            margin-bottom: 14px;
        }
        .modal-field label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #3a3a3c;
            margin-bottom: 4px;
        }
        .modal-field input[type="text"],
        .modal-field input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0dedc;
            border-radius: 12px;
            font-size: 15px;
            background: #faf9f8;
            outline: none;
        }
        .modal-field input:focus {
            border-color: #1c1c1e;
            background: #fff;
        }
        .modal-field input[readonly] {
            background: #f0eeec;
            color: #6e6e73;
        }
        .modal-field .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .modal-field .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #1c1c1e;
            cursor: pointer;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .modal-buttons .btn-cancel {
            background: #f0eeec;
            color: #3a3a3c;
        }
        .modal-buttons .btn-cancel:active {
            background: #e0dedc;
        }
        .modal-buttons .btn-confirm {
            background: #1c1c1e;
            color: #fff;
        }
        .modal-buttons .btn-confirm:active {
            background: #3a3a3c;
        }

        @media (max-width: 400px) {
            .container {
                padding: 8px 8px 0;
            }
            .record-delete {
                width: 70px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <button class="back-btn" id="backBtn">‹</button>
        <span class="title">📋 记录管理</span>
        <button class="add-btn" id="addBtn">+ 添加</button>
    </div>
    <div class="record-list" id="recordList"><div class="empty-tip">暂无记录，点击右上角添加 ✨</div></div>
</div>

<!-- 添加弹窗 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3>📝 添加记录</h3>
        <div class="modal-field"><label>📅 日期</label><input type="text" id="modalDate" readonly></div>
        <div class="modal-field"><label>⏱️ 持续时长（秒）</label><input type="number" id="modalDuration" placeholder="例如 1800" min="0" step="1" value="0"></div>
        <div class="modal-field"><div class="checkbox-group"><input type="checkbox" id="modalUseTool"><label for="modalUseTool">🔧 使用器械</label></div></div>
        <div class="modal-field"><div class="checkbox-group"><input type="checkbox" id="modalWithPartner"><label for="modalWithPartner">👥 和伴侣一起</label></div></div>
        <div class="modal-field"><label>📝 方式描述（可选）</label><input type="text" id="modalMethodDesc" placeholder="例如：正常体位" maxlength="50"></div>
        <div class="modal-field"><div class="checkbox-group"><input type="checkbox" id="modalUseMaterial"><label for="modalUseMaterial">📱 使用素材</label></div></div>
        <div class="modal-buttons"><button class="btn-cancel" id="modalCancel">取消</button><button class="btn-confirm" id="modalConfirm">保存</button></div>
    </div>
</div>

<script>
    // 使用 main.js 中的 getToday
    const recordListEl = document.getElementById('recordList');
    const backBtn = document.getElementById('backBtn');
    const addBtn = document.getElementById('addBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalDate = document.getElementById('modalDate');
    const modalDuration = document.getElementById('modalDuration');
    const modalUseTool = document.getElementById('modalUseTool');
    const modalWithPartner = document.getElementById('modalWithPartner');
    const modalMethodDesc = document.getElementById('modalMethodDesc');
    const modalUseMaterial = document.getElementById('modalUseMaterial');
    const modalCancel = document.getElementById('modalCancel');
    const modalConfirm = document.getElementById('modalConfirm');

    let touchStartX = 0, touchCurrentX = 0, isDragging = false, currentWrapper = null;
    const SWIPE_THRESHOLD = 50;

    async function renderRecords() {
        try {
            const records = await window.DB.getAllRecords();
            if (!records || records.length === 0) {
                recordListEl.innerHTML = '<div class="empty-tip">暂无记录，点击右上角添加 ✨</div>';
                return;
            }
            let html = '';
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            records.forEach(record => {
                const dateObj = new Date(record.current_date + 'T00:00:00');
                const weekday = weekdays[dateObj.getDay()];
                const durationMin = Math.floor(record.duration / 60);
                const durationSec = record.duration % 60;
                let durationText = '';
                if (record.duration > 0) {
                    if (durationMin > 0) durationText = durationMin + ' 分' + (durationSec > 0 ? ' ' + durationSec + ' 秒' : '');
                    else durationText = durationSec + ' 秒';
                } else durationText = '未记录';
                let tags = [];
                if (record.use_tool) tags.push('<span class="tag active-tool">🔧 器械</span>');
                if (record.with_partner) tags.push('<span class="tag active-partner">👥 伴侣</span>');
                if (record.use_material) tags.push('<span class="tag active-material">📱 素材</span>');
                if (tags.length === 0) tags.push('<span class="tag">无标记</span>');
                const methodHtml = record.method_desc ? `<div class="record-method">📝 ${record.method_desc}</div>` : '';
                html += `
                    <div class="record-wrapper" data-id="${record.id}">
                        <div class="record-slide">
                            <div class="record-content">
                                <div class="record-info">
                                    <div class="record-date">${record.current_date} <span class="weekday">周${weekday}</span></div>
                                    <div class="record-details">
                                        <span class="detail-item"><span class="label">⏱️</span><span class="value">${durationText}</span></span>
                                        ${tags.join(' ')}
                                    </div>
                                    ${methodHtml}
                                </div>
                            </div>
                            <div class="record-delete" data-id="${record.id}">删除</div>
                        </div>
                    </div>
                `;
            });
            recordListEl.innerHTML = html;

            document.querySelectorAll('.record-delete').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.getAttribute('data-id'));
                    if (confirm('确定要删除这条记录吗？')) {
                        const success = await window.DB.deleteRecordById(id);
                        if (success) {
                            if (typeof plus !== 'undefined') plus.ui.toast('已删除');
                            else alert('已删除');
                            await renderRecords();
                        } else {
                            if (typeof plus !== 'undefined') plus.ui.toast('删除失败');
                            else alert('删除失败');
                        }
                    }
                    resetAllSwipes();
                });
            });

            document.querySelectorAll('.record-wrapper').forEach(wrapper => {
                wrapper.addEventListener('touchstart', handleTouchStart, { passive: true });
                wrapper.addEventListener('touchmove', handleTouchMove, { passive: false });
                wrapper.addEventListener('touchend', handleTouchEnd, { passive: true });
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.record-wrapper')) resetAllSwipes();
            });
        } catch (e) {
            console.error('渲染记录失败:', e);
            recordListEl.innerHTML = '<div class="empty-tip">加载失败，请重试</div>';
        }
    }

    function handleTouchStart(e) {
        const wrapper = e.currentTarget;
        resetAllSwipes();
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchCurrentX = touchStartX;
        isDragging = true;
        currentWrapper = wrapper;
        const slide = wrapper.querySelector('.record-slide');
        slide.style.transition = 'none';
    }

    function handleTouchMove(e) {
        if (!isDragging || !currentWrapper) return;
        const touch = e.touches[0];
        touchCurrentX = touch.clientX;
        const deltaX = touchCurrentX - touchStartX;
        const maxSwipe = -80;
        let translateX = Math.max(maxSwipe, Math.min(0, deltaX));
        const slide = currentWrapper.querySelector('.record-slide');
        slide.style.transform = 'translateX(' + translateX + 'px)';
        if (deltaX < -10) e.preventDefault();
    }

    function handleTouchEnd(e) {
        if (!isDragging || !currentWrapper) { isDragging = false; return; }
        const slide = currentWrapper.querySelector('.record-slide');
        const deltaX = touchCurrentX - touchStartX;
        if (deltaX < -SWIPE_THRESHOLD) {
            slide.style.transition = 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)';
            slide.style.transform = 'translateX(-80px)';
            currentWrapper.setAttribute('data-open', 'true');
        } else {
            slide.style.transition = 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)';
            slide.style.transform = 'translateX(0)';
            currentWrapper.removeAttribute('data-open');
        }
        isDragging = false;
        currentWrapper = null;
    }

    function resetAllSwipes() {
        document.querySelectorAll('.record-wrapper[data-open="true"]').forEach(wrapper => {
            const slide = wrapper.querySelector('.record-slide');
            if (slide) {
                slide.style.transition = 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)';
                slide.style.transform = 'translateX(0)';
                wrapper.removeAttribute('data-open');
            }
        });
    }

    function openModal() {
        const today = typeof getToday === 'function' ? getToday() : (function() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        })();
        modalDate.value = today;
        modalDuration.value = 0;
        modalUseTool.checked = false;
        modalWithPartner.checked = false;
        modalMethodDesc.value = '';
        modalUseMaterial.checked = false;
        modalOverlay.classList.add('show');
    }

    function closeModal() { modalOverlay.classList.remove('show'); }

    async function saveRecord() {
        const date = modalDate.value;
        const duration = parseInt(modalDuration.value) || 0;
        const useTool = modalUseTool.checked;
        const withPartner = modalWithPartner.checked;
        const methodDesc = modalMethodDesc.value.trim();
        const useMaterial = modalUseMaterial.checked;
        if (!date) { if (typeof plus !== 'undefined') plus.ui.toast('日期不能为空'); else alert('日期不能为空'); return; }
        try {
            await window.DB.insertRecord(date, duration, useTool, withPartner, methodDesc, useMaterial);
            closeModal();
            if (typeof plus !== 'undefined') plus.ui.toast('✅ 记录成功');
            else alert('记录成功');
            await renderRecords();
        } catch (e) {
            console.error('保存失败:', e);
            if (typeof plus !== 'undefined') plus.ui.toast('保存失败');
            else alert('保存失败');
        }
    }

    backBtn.addEventListener('click', function() { location.href = 'index.html'; });
    addBtn.addEventListener('click', openModal);
    modalCancel.addEventListener('click', closeModal);
    modalConfirm.addEventListener('click', saveRecord);
    modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) closeModal(); });

    async function initApp() {
        if (typeof window.DB === 'undefined') {
            recordListEl.innerHTML = '<div class="empty-tip">数据库模块未加载</div>';
            return;
        }
        try {
            const ok = await window.DB.initDatabase();
            if (ok) await renderRecords();
            else recordListEl.innerHTML = '<div class="empty-tip">数据库初始化失败</div>';
        } catch (e) {
            recordListEl.innerHTML = '<div class="empty-tip">数据库初始化异常</div>';
        }
    }

    document.addEventListener('plusready', initApp);
    if (typeof plus !== 'undefined' && plus.device) initApp();
</script>
</body>
</html>
