<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>健康保持者</title>
    <!-- 公共样式 -->
    <link rel="stylesheet" href="css/main.css">
    <script src="js/initdatabase.js"></script>
    <script src="js/main.js"></script>
    <style>
        /* ===== 首页特有样式 ===== */
        .header-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-card .app-title {
            font-size: 18px;
            font-weight: 600;
        }
        .header-card .date-main {
            font-size: 16px;
            font-weight: 500;
        }
        .header-card .date-sub {
            font-size: 12px;
            color: #8e8e93;
        }

        .days-card {
            text-align: center;
            padding: 12px 16px;
        }
        .days-card .number {
            font-size: 42px;
            font-weight: 700;
        }
        .days-card .number .unit {
            font-size: 18px;
            font-weight: 400;
            color: #8e8e93;
        }
        .days-card .label {
            font-size: 14px;
            color: #8e8e93;
            margin-top: 2px;
        }
        .days-card .sub-info {
            font-size: 12px;
            color: #aeaeb2;
            margin-top: 4px;
        }

        .calc-card .calc-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .calc-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .calc-row label {
            font-size: 14px;
            color: #3a3a3c;
            min-width: 44px;
        }
        .calc-row input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e0dedc;
            border-radius: 10px;
            font-size: 15px;
            background: #fff;
            outline: none;
        }
        .calc-row .calc-result {
            font-size: 15px;
            font-weight: 500;
            text-align: right;
            min-width: 100px;
        }
        .calc-row .calc-result .highlight {
            color: #007aff;
            font-weight: 600;
        }
        .calc-hint {
            font-size: 12px;
            color: #aeaeb2;
            margin-top: 6px;
        }

        .quote-card {
            text-align: center;
            padding: 10px 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: auto;
        }
        .quote-card .quote-text {
            font-size: 13px;
            color: #8e8e93;
            font-style: italic;
        }
        .quote-card .quote-author {
            font-size: 12px;
            color: #aeaeb2;
            margin-top: 2px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card header-card">
        <div class="app-title">健康保持者 <span style="font-size:14px;color:#8e8e93;font-weight:400;">· 私密</span></div>
        <div class="date-box">
            <div class="date-main" id="todayDate">--</div>
            <div class="date-sub" id="todayWeekday">----</div>
        </div>
    </div>
    <div class="card days-card">
        <div class="number"><span id="daysSince">--</span><span class="unit">天</span></div>
        <div class="label">距离最近一次涩涩</div>
        <div class="sub-info" id="lastDateInfo">暂无记录</div>
    </div>
    <button class="btn-primary" id="goToRecordBtn">添加 / 查看记录</button>
    <div class="card calc-card">
        <div class="calc-title">周期计算器 (⚠ 仅供参考)</div>
        <div class="calc-row">
            <label>年龄</label>
            <input type="number" id="ageInput" placeholder="20~99" min="20" max="99" value="30">
            <div class="calc-result" id="calcResult">输入年龄</div>
        </div>
        <div class="calc-hint">💡 公式：年龄十位数 × 9，积的十位数为周期(天)，个位数为建议次数。30岁 → 20天7次</div>
    </div>
    <div class="card quote-card">
        <div class="quote-text" id="quoteText">“性爱是生命赋予我们的最美好的礼物之一。”</div>
        <div class="quote-author" id="quoteAuthor">—— 佚名</div>
    </div>
</div>

<script>
    // 使用 main.js 中的 QUOTES、getToday、formatDateChinese、daysBetween

    function renderUI() {
        var today = getToday();
        var parts = today.split('-');
        var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        var d = new Date(parts[0], parts[1] - 1, parts[2]);
        document.getElementById('todayDate').textContent = parts[0] + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
        document.getElementById('todayWeekday').textContent = '星期' + weekdays[d.getDay()];

        if (window.DB && typeof window.DB.getLatestRecord === 'function') {
            window.DB.getLatestRecord().then(function(latest) {
                if (latest) {
                    var diff = daysBetween(latest.current_date, today);
                    document.getElementById('daysSince').textContent = diff;
                    document.getElementById('lastDateInfo').textContent = '最近一次：' + formatDateChinese(latest.current_date);
                } else {
                    document.getElementById('daysSince').textContent = '--';
                    document.getElementById('lastDateInfo').textContent = '暂无记录，开始记录你的第一次 ✨';
                }
            }).catch(function(e) {
                console.error('getLatestRecord 失败:', e);
                document.getElementById('daysSince').textContent = '?';
                document.getElementById('lastDateInfo').textContent = '加载失败';
            });
        } else {
            document.getElementById('daysSince').textContent = '?';
            document.getElementById('lastDateInfo').textContent = '数据库未就绪';
        }

        var idx = Math.floor(Math.random() * QUOTES.length);
        document.getElementById('quoteText').textContent = '“' + QUOTES[idx].text + '”';
        document.getElementById('quoteAuthor').textContent = QUOTES[idx].author;

        calculateFrequency();
    }

    function calculateFrequency() {
        var age = parseInt(document.getElementById('ageInput').value);
        var resultEl = document.getElementById('calcResult');
        if (isNaN(age) || age < 20 || age > 99) {
            resultEl.innerHTML = '请输入 20~99';
            return;
        }
        var tens = Math.floor(age / 10);
        var product = tens * 9;
        var cycleDays = product - (product % 10);
        var times = product % 10;
        resultEl.innerHTML = '<span class="highlight">' + cycleDays + '</span> 天内 <span class="highlight">' + times + '</span> 次';
    }

    async function initApp() {
        if (window.DB && window.DB.initDatabase) {
            try { await window.DB.initDatabase(); } catch(e) {}
        }
        renderUI();
        document.getElementById('goToRecordBtn').addEventListener('click', function() {
            location.href = 'records.html';
        });
        document.getElementById('ageInput').addEventListener('input', calculateFrequency);
        document.getElementById('ageInput').addEventListener('change', calculateFrequency);
    }

    document.addEventListener('plusready', initApp);
    if (typeof plus !== 'undefined' && plus.device) initApp();
</script>
</body>
</html>
